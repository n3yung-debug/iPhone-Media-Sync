name: Release

# Manually dispatched. Runs on GitHub's runner with the repo token, so it can
# create the tag and publish the Release (which the dev sandbox cannot push
# directly). Builds the Windows app and attaches it to the release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without the leading v)"
        required: true
        default: "1.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable (folder build)
        id: build
        continue-on-error: true
        run: pyinstaller --noconfirm --clean iphone-media-sync.spec

      - name: Zip the app folder
        if: steps.build.outcome == 'success'
        run: Compress-Archive -Path dist/iPhoneMediaSync/* -DestinationPath iPhoneMediaSync-windows.zip
        shell: pwsh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          target_commitish: ${{ github.sha }}
          name: iPhone Media Sync v${{ github.event.inputs.version }}
          body_path: RELEASE_NOTES.md
          files: iPhoneMediaSync-windows.zip
          fail_on_unmatched_files: false

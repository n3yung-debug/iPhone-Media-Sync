name: Test

# Runs the (Qt-free) test suite and the linter on every push / PR. Fast and
# cheap — no PySide6 needed — so regressions and style issues are caught early.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test tooling
        run: python -m pip install --upgrade pytest ruff

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: python -m pytest tests/ -q
        env:
          PYTHONPATH: src

name: Build Windows EXE

# Builds dist/iPhoneMediaSync.exe on a Windows runner and uploads it as a
# downloadable artifact, so no local Python toolchain is needed.

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        run: pyinstaller --noconfirm --clean iphone-media-sync.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: iPhoneMediaSync-windows
          path: dist/iPhoneMediaSync.exe
          if-no-files-found: error

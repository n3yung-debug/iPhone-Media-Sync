name: Build Windows EXE

# Builds the folder app (dist/iPhoneMediaSync/) on a Windows runner, zips it,
# and:
#   * on any push / manual run -> uploads the zip as a downloadable artifact
#   * on a version tag (e.g. v1.0.0) -> publishes the zip to a GitHub Release
#     with a permanent download link.

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable (folder build)
        run: pyinstaller --noconfirm --clean iphone-media-sync.spec

      - name: Zip the app folder
        run: Compress-Archive -Path dist/iPhoneMediaSync/* -DestinationPath iPhoneMediaSync-windows.zip
        shell: pwsh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: iPhoneMediaSync-windows
          path: iPhoneMediaSync-windows.zip
          if-no-files-found: error

      - name: Publish to Release (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iPhoneMediaSync-windows.zip
          generate_release_notes: true
